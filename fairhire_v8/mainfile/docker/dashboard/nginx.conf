# NOTE: Replace every occurrence of "YOUR_DOMAIN_HERE" in this file with your
# actual domain before running docker compose up.
# There are 7 places to update: server_name (x2), ssl_certificate (x2),
# ssl_certificate_key (x2), and the Content-Security-Policy header (x1).
#
# ══════════════════════════════════════════════════════════════════════════════
# BUGS FIXED IN THIS REVISION
# ══════════════════════════════════════════════════════════════════════════════
# BUG-B (CRITICAL): Added client_max_body_size 12m; and proxy_read_timeout 120s;
#         to the location /api block. Without these, nginx rejected CSV uploads
#         between 1 MB and 10 MB with HTTP 413 (default 1 MB body limit), and
#         killed in-flight audit requests after 60 seconds (default proxy
#         timeout) even though the audit engine needs up to 60 s on large files.
# ══════════════════════════════════════════════════════════════════════════════

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name YOUR_DOMAIN_HERE www.YOUR_DOMAIN_HERE;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_DOMAIN_HERE www.YOUR_DOMAIN_HERE;

    # SSL Certificates (Let's Encrypt)
    # Run before first docker compose up:
    #   certbot certonly --standalone -d YOUR_DOMAIN_HERE -d www.YOUR_DOMAIN_HERE
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;

    # SSL hardening
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security Headers
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://YOUR_DOMAIN_HERE https://www.YOUR_DOMAIN_HERE;" always;

    # Serve built static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the FastAPI backend
    # Backend is only reachable via the internal Docker network (fairhire-net)
    location /api {
        client_max_body_size 12m;
        proxy_read_timeout 120s;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Healthcheck endpoint
    location /healthz {
        access_log off;
        return 200 "healthy\n";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
